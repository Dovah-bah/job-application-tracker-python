<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007BFF; color: white; }
        form { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin-bottom: 20px; }
        input, button, select { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button.btn-add { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 13px; }
        .update-form { display: inline-flex; margin: 0; padding: 0; box-shadow: none; background: none; }
        .update-form select { width: auto; margin: 0 5px 0 0; padding: 4px; }
        .update-form button { width: auto; margin: 0; padding: 4px 8px; background: #17a2b8; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📋 Καταγραφή Αιτήσεων Εργασίας</h2>
    
    <form action="/add" method="POST">
        <input type="text" name="company_name" placeholder="Όνομα Εταιρείας" required>
        <input type="text" name="job_title" placeholder="Τίτλος Θέσης (e.g. Junior Dev)" required>
        <input type="date" name="app_date" required>
        <button type="submit" class="btn-add">Προσθήκη Αίτησης</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Εταιρεία</th>
                <th>Θέση Εργασίας</th>
                <th>Ημερομηνία</th>
                <th>Κατάσταση (Status)</th>
                <th>Ενέργειες</th>
            </tr>
        </thead>
        <tbody>
            {% for job in jobs %}
            <tr>
                <td>{{ job.company_name }}</td>
                <td>{{ job.job_title }}</td>
                <td>{{ job.app_date }}</td>
                <td>
                    <form action="/update/{{ job.id }}" method="POST" class="update-form">
                        <select name="status">
                            <option value="Applied" {% if job.status == 'Applied' %}selected{% endif %}>Applied</option>
                            <option value="Interview" {% if job.status == 'Interview' %}selected{% endif %}>Interview</option>
                            <option value="Rejected" {% if job.status == 'Rejected' %}selected{% endif %}>Rejected</option>
                            <option value="No Answer" {% if job.status == 'No Answer' %}selected{% endif %}>No Answer</option>
                        </select>
                        <button type="submit">OK</button>
                    </form>
                </td>
                <td>
                    <a href="/delete/{{ job.id }}" class="btn-delete" onclick="return confirm('Θέλεις σίγουρα να διαγράψεις αυτή την καταγραφή;')">Διαγραφή</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
